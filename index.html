<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selected Clients</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f2;
  --grey: #99948f;
  --rule: #e0ddd8;
}

body {
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.clients {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 48px 80px;
}

.eyebrow {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 40px 0 36px;
}

.eyebrow span {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--grey);
  white-space: nowrap;
}

.eyebrow::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

.logo-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  row-gap: 6px;
  column-gap: 8px;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 56px;
  padding: 0 8px;
}

/* BASE — logos fill column width, height controls optical size */
.logo img {
  display: block;
  width: 85%;
  height: auto;
  max-height: 38px;
  object-fit: contain;
  filter: grayscale(1) contrast(4);
  mix-blend-mode: multiply;
  opacity: 0.88;
  transition: opacity 0.2s ease;
}

.logo:hover img { opacity: 1; }

/* Optical balancing — height only, let width fill naturally */
/* Tall/square logos — pull height back */
.logo--amex img      { max-height: 36px; }
.logo--mcfc img      { max-height: 42px; }
.logo--vauxhall img  { max-height: 42px; }
.logo--vodafone img  { max-height: 42px; }
.logo--adobe img     { max-height: 36px; }

/* Wide wordmarks — cap height low so they spread wide */
.logo--ba img          { max-height: 20px; }
.logo--playstation img { max-height: 20px; }
.logo--toblerone img   { max-height: 20px; }
.logo--pottermore img  { max-height: 22px; }
.logo--nespresso img   { max-height: 22px; }
.logo--samsung img     { max-height: 24px; }
.logo--tesco img       { max-height: 26px; }
.logo--nintendo img    { max-height: 28px; }
.logo--heinz img       { max-height: 40px; }

/* Script logos — need height to read */
.logo--coke img        { max-height: 44px; }
.logo--cadbury img     { max-height: 40px; }
.logo--boots img       { max-height: 44px; }
.logo--ford img        { max-height: 46px; }

/* Tablet: 5 cols */
@media (max-width: 1100px) {
  .clients { padding: 0 32px 64px; }
  .logo-grid { grid-template-columns: repeat(5, 1fr); row-gap: 6px; column-gap: 8px; }
  .logo.tier-3 { display: none; }
}

/* Mobile: 3 cols */
@media (max-width: 640px) {
  .clients { padding: 0 20px 48px; }
  .logo-grid { grid-template-columns: repeat(3, 1fr); row-gap: 4px; column-gap: 6px; }
  .logo.tier-2, .logo.tier-3 { display: none; }
  .logo { height: 48px; }
}
</style>
</head>

<body>

<div class="clients">

  <div class="eyebrow"><span>Selected clients</span></div>

  <div class="logo-grid">

    <!-- ROW 1 -->
    <div class="logo logo--amex tier-1">
      <img src="logos/American-Express.png" alt="American Express">
    </div>
    <div class="logo logo--ba tier-1">
      <img src="logos/British-Airways.png" alt="British Airways">
    </div>
    <div class="logo logo--coke tier-1">
      <img src="logos/Coca-Cola.png" alt="Coca-Cola">
    </div>
    <div class="logo logo--samsung tier-1">
      <img src="logos/Samsung.png" alt="Samsung">
    </div>
    <div class="logo logo--adobe tier-1">
      <img src="logos/Adobe.png" alt="Adobe">
    </div>
    <div class="logo logo--amazon tier-1">
      <img src="logos/Amazon.png" alt="Amazon">
    </div>
    <div class="logo logo--cadbury tier-1">
      <img src="logos/Cadbury.png" alt="Cadbury">
    </div>

    <!-- ROW 2 -->
    <div class="logo logo--nespresso tier-1">
      <img src="logos/Nespresso.png" alt="Nespresso">
    </div>
    <div class="logo logo--boots tier-1">
      <img src="logos/Boots.png" alt="Boots">
    </div>
    <div class="logo logo--tesco tier-1">
      <img src="logos/Tesco.png" alt="Tesco">
    </div>
    <div class="logo logo--pottermore tier-2">
      <img src="logos/Pottermore.png" alt="Pottermore">
    </div>
    <div class="logo logo--heinz tier-1">
      <img src="logos/Heinz.png" alt="Heinz">
    </div>
    <div class="logo logo--nintendo tier-1">
      <img src="logos/Nintendo.png" alt="Nintendo">
    </div>
    <div class="logo tier-2">
      <img src="logos/Sage.png" alt="Sage">
    </div>

    <!-- ROW 3 -->
    <div class="logo logo--ford tier-2">
      <img src="logos/Ford.png" alt="Ford">
    </div>
    <div class="logo logo--vauxhall tier-2">
      <img src="logos/Vauxhall.png" alt="Vauxhall">
    </div>
    <div class="logo logo--playstation tier-2">
      <img src="logos/Playstation.png" alt="PlayStation">
    </div>
    <div class="logo logo--vodafone tier-2">
      <img src="logos/Vodafone.png" alt="Vodafone">
    </div>
    <div class="logo tier-2">
      <img src="logos/Santander.png" alt="Santander">
    </div>
    <div class="logo tier-2">
      <img src="logos/IHG.png" alt="IHG">
    </div>
    <div class="logo tier-2">
      <img src="logos/Danone.png" alt="Danone">
    </div>

    <!-- ROW 4 -->
    <div class="logo tier-3">
      <img src="logos/The-Body-Shop.png" alt="The Body Shop">
    </div>
    <div class="logo logo--deliveroo tier-1">
      <img src="logos/Deliveroo.png" alt="Deliveroo">
    </div>
    <div class="logo logo--toblerone tier-3">
      <img src="logos/Toblerone.png" alt="Toblerone">
    </div>
    <div class="logo tier-3">
      <img src="logos/Philips.png" alt="Philips">
    </div>
    <div class="logo tier-3">
      <img src="logos/BT.png" alt="BT">
    </div>
    <div class="logo tier-3">
      <img src="logos/Land-Rover.png" alt="Land Rover">
    </div>
    <div class="logo logo--mcfc tier-3">
      <img src="logos/Manchester-City.png" alt="Manchester City">
    </div>

  </div>
</div>

</body>
</html>
